<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="郭耀儒的视觉策展作品集，展示东方意境、未来科技、城市情绪与极简构成。" />
    <title>视觉作品集 · YAORU-GUO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700;900&family=Noto+Serif+SC:wght@600;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="notes-body portfolio-body">
    <div class="room-grain" aria-hidden="true"></div>

    <div class="portfolio-desktop-canvas" data-desktop-canvas>
      <header class="top-marquee">
        <span>YAORU-GUO 视觉作品频道</span>
        <span><i class="rec-dot"></i> AESTHETIC ARCHIVE / 50 WORKS</span>
        <a href="index.html">返回个人频道 ↗</a>
      </header>

      <main class="notes-tv portfolio-tv">
        <section class="screen-wrap">
          <div class="screen notes-screen">
            <div class="screen-vignette"></div>
            <div class="screen-inner">
              <div class="hud">
                <span class="station">YAORU TV</span>
                <span class="ch-id">CH 07 / 视觉作品集</span>
                <span class="hud-rec">REC</span>
              </div>

              <section class="notes-channel portfolio-channel">
                <div class="portfolio-intro">
                  <div>
                    <p>AESTHETIC SIGNAL / CURATED SELECTION</p>
                    <h1>视觉作品集</h1>
                  </div>
                  <div class="portfolio-intro-copy">
                    <p>四种视觉语言，五十个审美切片。关注氛围、构图、秩序与情绪，展示我的视觉判断与策展能力。</p>
                    <a href="credits.html">图片来源与授权 ↗</a>
                  </div>
                </div>

                <div class="portfolio-filters" role="group" aria-label="作品分类筛选">
                  <button class="active" type="button" data-filter="all">全部作品 <span>50</span></button>
                  <button type="button" data-filter="eastern">东方意境 <span>13</span></button>
                  <button type="button" data-filter="future">未来科技 <span>12</span></button>
                  <button type="button" data-filter="urban">城市情绪 <span>13</span></button>
                  <button type="button" data-filter="minimal">极简构成 <span>12</span></button>
                </div>

                <div class="portfolio-grid" data-portfolio-grid aria-live="polite">
                  <p class="portfolio-loading">正在接收视觉信号...</p>
                </div>
              </section>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div class="portfolio-lightbox" data-lightbox aria-hidden="true">
      <button type="button" data-lightbox-close aria-label="关闭大图">×</button>
      <button class="lightbox-nav prev" type="button" data-lightbox-prev aria-label="上一张">←</button>
      <figure>
        <img data-lightbox-image alt="" />
        <figcaption><span data-lightbox-meta></span><b data-lightbox-title></b></figcaption>
      </figure>
      <button class="lightbox-nav next" type="button" data-lightbox-next aria-label="下一张">→</button>
    </div>

    <script src="portfolio.js"></script>
  </body>
</html>
